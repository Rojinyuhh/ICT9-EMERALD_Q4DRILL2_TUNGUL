<!DOCTYPE html>
<html lang="en">
<head>
  <title>Q4 DRILL 2</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <link href="styles.css" rel="stylesheet">

  <style>
    body{
        background: url(bg.png);
        font-family:'Courier New', Courier, monospace;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }

    .checker{
        background-color: #de9843;
        width: 550px;
        height: 550px;
        padding: 20px;
        border-radius: 15px;
        box-shadow: 2px 5px 5px #5c380be8;
        color: #5c0b0b;
    }

    input{
        width: 470px;
        height: 40px;
        padding: 5px;
        text-align: center;
        border-radius: 7px;
        display: block;
        text-align: center;
        margin: 10px auto;
        border: none;
    }

    button{
        align-items: center;
        width: 300px;
        height: 40px;
        border-radius: 5px;
        border: none;
        background-color: #702121;
        color: white;
        display: block;
        margin-left: 5.5rem;
        display: block;
        text-align: center;
        margin: 10px auto;
    }

    h3{
        font-size: 20px;
    }

    p{
        font-size: 15px
    }

    h1{
        text-align: center;
        font-weight: bolder;
    }

    h2{
        font-size: 25px;
    }
  </style>

</head>
<body>
    <div class="checker">
    <h1>Heat Index Checker</h1>
    <br>
    <h2>Note:</h2>
    <p>Input the temperature (°C) and the humidity (%), then click the button to see the heat index and its status.</p>
    <br>

    <h3><b>Humidity in %</b></h3>
    <input type="number" id="humidInput" placeholder="Input percentage value"> <br> <br>
    <h3><b>Degree in °C</b></h3>
    <input type="number" id="tempInput" placeholder="Input degree value"> <br>
    <button onclick="checkHeat()"><b>CHECK</b></button>
    </div>

    <script>
        function checkHeat(){
            var humidity = parseInt(document.getElementById("humidInput").value);
            var temperature = parseInt(document.getElementById("tempInput").value);
            var heatindex = temperature + (0.33 * humidity) - 4;
            var status;

            switch(true){
                case (heatindex >= 42):
                    status = "Extreme Heat/Danger";
                    break;
                case (heatindex >= 38 && heatindex <= 41):
                    status = "Very Hot/Caution";
                    break;
                case (heatindex >= 33 && heatindex <= 37):
                    status = "Hot";
                    break;
                case (heatindex >= 28 && heatindex <= 32):
                    status = "Warm";
                    break;
                case (heatindex <= 27):
                    status = "Comfortable/Cool";
                    break;
                default:
                    status = "Invalid Input, Please enter a valid temperature and humidity.";
            }
            alert("The heat index is " + heatindex + " and the status is " + status);
        }
    </script>

</body>
</html>
